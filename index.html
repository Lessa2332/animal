<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>🌍 Місія: Біосфера — AR Квест</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="tap-place.js"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #camera-consent, #decoder-panel, #quiz-panel {
      position: fixed; background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(15px); color: white; padding: 25px;
      border-radius: 30px; z-index: 1000; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
    }
    #camera-consent { bottom: 30px; left: 15px; right: 15px; }
    #decoder-panel, #quiz-panel { top: 5%; left: 5%; right: 5%; bottom: 5%; display: none; overflow-y: auto; }
    h2 { color: #60a5fa; margin-top: 0; }
    p { font-size: 15px; line-height: 1.4; color: #cbd5e1; }
    button {
      background: #3b82f6; border: none; padding: 12px 25px;
      margin: 8px; border-radius: 15px; font-size: 16px;
      font-weight: bold; color: white; cursor: pointer; transition: 0.3s;
    }
    .fixed-btn {
      position: fixed; right: 20px; padding: 10px 20px;
      border-radius: 12px; font-weight: bold; z-index: 1001;
    }
    #open-decoder { top: 20px; background: #f59e0b; }
    #quiz-btn { top: 75px; background: #8b5cf6; }
    input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; text-align: center; }
  </style>
</head>
<body>

  <button id="open-decoder" class="fixed-btn" style="display:none;">🔑 Ввести код</button>
  <button id="quiz-btn" class="fixed-btn" onclick="showQuiz()" style="display:none;">📝 Вікторина</button>

  <div id="camera-consent">
    <h2>🌍 Привіт, досліднику!</h2>
    <p>Наведи камеру на підлогу, знайди відповіді та отримай зірки Географа!</p>
    <button id="accept-camera">🚀 Почати місію</button>
  </div>

  <div id="decoder-panel">
    <h2>🔑 Декодер</h2>
    <input id="code-input" type="text" placeholder="СЛОВО-ПАРОЛЬ...">
    <button id="decrypt-btn">🔓 Активувати</button>
    <button onclick="hideDecoder()">Назад</button>
    <div id="decoder-result" style="margin-top:15px;"></div>
  </div>

  <div id="quiz-panel">
    <h2>📝 Тест</h2>
    <div id="quiz-content"></div>
    <button onclick="checkQuiz()">Перевірити</button>
    <button onclick="hideQuiz()">Закрити</button>
    <div id="quiz-result"></div>
  </div>

  <a-scene xrconfig="allowedDevices: any" xrweb="disableWorldTracking: false" ar-hit-test="mode: plane" tap-place>
    <a-assets>
      <a-asset-item id="planetModel" src="planet.glb"></a-asset-item>
    </a-assets>
    <a-camera id="camera" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>
    <a-entity light="type: directional; intensity: 1.5;" position="1 4 3"></a-entity>
    <a-light type="ambient" intensity="1.2"></a-light>
    <a-box id="ground" class="cantap" scale="1000 0.01 1000" visible="false"></a-box>

    <a-text
      id="helper-text"
      value="🌍 Торкнись підлоги, щоб створити планету"
      position="0 1.8 -2"
      align="center"
      width="2.5"
      background="true"
      background-color="#1e293b"
    ></a-text>
  </a-scene>

  <script>
    const acceptBtn = document.getElementById('accept-camera');
    acceptBtn.onclick = () => {
      document.getElementById('camera-consent').style.display = 'none';
      document.getElementById('open-decoder').style.display = 'block';
      document.getElementById('quiz-btn').style.display = 'block';
    };

    function showQuiz() { document.getElementById('quiz-panel').style.display = 'block'; renderQuiz(); }
    function hideQuiz() { document.getElementById('quiz-panel').style.display = 'none'; }
    function hideDecoder() { document.getElementById('decoder-panel').style.display = 'none'; }
    document.getElementById('open-decoder').onclick = () => { document.getElementById('decoder-panel').style.display = 'block'; };

    const questions = [
      {q: "1. Скільки млрд років тому виникло життя?", a: "3,5"},
      {q: "2. Газ, яким рослини збагачують повітря?", a: "кисень"},
      {q: "3. Хто засновник учення про біосферу?", a: "вернадський"},
      {q: "4. Сфера взаємодії людини і природи?", a: "ноосфера"},
      {q: "5. Сукупність усіх видів рослин території?", a: "флора"},
      {q: "6. Найщільніший шар життя — це «... життя»?", a: "плівка"}
    ];

    function renderQuiz() {
      let h = '';
      questions.forEach((q, i) => { h += `<p>${q.q}<br><input id="ans${i}"></p>`; });
      document.getElementById('quiz-content').innerHTML = h;
    }

    function checkQuiz() {
      let score = 0;
      questions.forEach((q, i) => {
        if (document.getElementById(`ans${i}`).value.toLowerCase().includes(q.a.toLowerCase())) score++;
      });
      const res = document.getElementById('quiz-result');
      if (score >= 5) {
        res.innerHTML = `⭐ ${score}/6! Код: <b>БІОСФЕРА</b>`;
      } else {
        res.innerHTML = `Потрібно 5 правильних, у тебе ${score}`;
      }
    }

    document.getElementById('decrypt-btn').onclick = () => {
      if (document.getElementById('code-input').value.trim().toLowerCase() === 'біосфера') {
        document.getElementById('decoder-result').innerHTML = "🚀 КОД ПРИЙНЯТО!";
        if (window.spawnStars) window.spawnStars();
      } else {
        document.getElementById('decoder-result').innerHTML = "❌ Невірно";
      }
    };
  </script>
</body>
</html>

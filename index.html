<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Місія: Таємна Локація | Активація</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous"></script>
  <script src="tap-place.js"></script>

  <style>
    :root { --glass: rgba(10, 15, 28, 0.95); --accent: #38bdf8; }
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }

    .glass-panel {
      position: fixed; background: var(--glass); backdrop-filter: blur(20px);
      border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 30px;
      z-index: 1000; text-align: center; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Стартовий екран активації */
    #activation-screen { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; padding: 30px; }
    
    /* HUD підказка після активації */
    #ar-instruction { bottom: 30px; left: 20px; right: 20px; padding: 15px; display: none; border: 2px solid var(--accent); }

    h2 { margin: 0 0 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    p { font-size: 15px; color: #94a3b8; line-height: 1.4; }

    .btn-activate {
      background: linear-gradient(135deg, #0ea5e9, #2563eb); border: none; padding: 16px;
      border-radius: 15px; color: white; font-weight: bold; cursor: pointer; width: 100%;
      margin-top: 20px; font-size: 16px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
    }

    input { 
      width: 100%; box-sizing: border-box; padding: 15px; margin-top: 15px; 
      border-radius: 12px; border: 1px solid #334155; background: #020617; 
      color: var(--accent); text-align: center; font-size: 18px; font-weight: bold;
    }

    .success-blink { animation: blink 0.5s ease infinite alternate; }
    @keyframes blink { from { border-color: var(--accent); } to { border-color: #4ade80; } }
  </style>
</head>
<body>

  <div id="activation-screen" class="glass-panel">
    <div style="font-size: 12px; color: #4ade80; margin-bottom: 10px;">> СИСТЕМА ОЧІКУЄ ПАРОЛЬ...</div>
    <h2>АКТИВАЦІЯ АРТЕФАКТУ</h2>
    <p>Введіть секретний код "Біосфера", щоб розблокувати доступ до голограми планети.</p>
    <input id="code-input" type="text" placeholder="КОД..." autocomplete="off">
    <button class="btn-activate" onclick="attemptActivation()">🔓 АКТИВУВАТИ</button>
  </div>

  <div id="ar-instruction" class="glass-panel">
    <h2 style="color: #4ade80;">ДОСТУП НАДАНО!</h2>
    <p>Наведи камеру на підлогу та торкнись екрана, щоб викликaти планету-артефакт.</p>
  </div>

  <a-scene xrconfig="allowedDevices: any" xrweb tap-place>
    <a-assets>
      <a-asset-item id="planetModel" src="planet.glb"></a-asset-item>
      <canvas id="infoCanvas" width="512" height="512" style="display:none;"></canvas>
    </a-assets>

    <a-camera id="camera" raycaster="objects: .planet-planted, .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>
    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="2 4 3" intensity="1"></a-light>
    
    <a-box id="ground" class="cantap" scale="1000 0.01 1000" visible="false"></a-box>
  </a-scene>

  <script>
    let isActivated = false;

    function attemptActivation() {
      const input = document.getElementById('code-input').value.trim().toLowerCase();
      if (input === 'біосфера') {
        isActivated = true;
        window.isARReady = true; // Глобальна зміна для JS файлу
        
        // Анімація переходу
        const screen = document.getElementById('activation-screen');
        screen.style.opacity = '0';
        screen.style.transform = 'translate(-50%, -60%) scale(0.9)';
        
        setTimeout(() => {
          screen.style.display = 'none';
          const instruction = document.getElementById('ar-instruction');
          instruction.style.display = 'block';
          instruction.classList.add('success-blink');
        }, 500);
      } else {
        alert("❌ Код невірний. Спробуй ще раз!");
      }
    }
  </script>
</body>
</html>

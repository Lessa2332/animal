<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>🌍 Місія: Таємна Локація — Біосфера AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="tap-place.js"></script>

  <style>
    :root { --glass: rgba(15, 23, 42, 0.95); --accent: #38bdf8; }
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }

    .glass-panel {
      position: fixed; background: var(--glass); backdrop-filter: blur(15px);
      border-radius: 30px; z-index: 1000; text-align: center;
      border: 1px solid rgba(255,255,255,0.1); color: white;
      transition: 0.5s ease;
    }

    /* Вікно входу */
    #mission-start { bottom: 30px; left: 15px; right: 15px; padding: 25px; }

    /* Панелі квесту */
    #decoder-panel, #quiz-panel { 
      top: 5%; left: 5%; right: 5%; bottom: 5%; 
      display: none; padding: 25px; overflow-y: auto; 
    }

    /* Інструкція після активації */
    #ar-instruction { 
      bottom: 30px; left: 20px; right: 20px; padding: 15px; 
      display: none; border: 2px solid var(--accent); 
    }

    h2 { color: var(--accent); margin-top: 0; text-transform: uppercase; }
    p { font-size: 15px; color: #cbd5e1; }

    button {
      background: #3b82f6; border: none; padding: 12px 25px;
      margin: 8px; border-radius: 15px; font-size: 16px;
      font-weight: bold; color: white; cursor: pointer;
    }

    .fixed-btn {
      position: fixed; right: 20px; padding: 10px 20px;
      border-radius: 12px; font-weight: bold; z-index: 1001; display: none;
    }
    #open-decoder { top: 20px; background: #f59e0b; }
    #quiz-btn { top: 75px; background: #8b5cf6; }

    input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; text-align: center; }
    .success-blink { animation: blink 0.5s ease infinite alternate; }
    @keyframes blink { from { border-color: var(--accent); } to { border-color: #4ade80; } }
  </style>
</head>
<body>

  <button id="open-decoder" class="fixed-btn">🔑 Код</button>
  <button id="quiz-btn" class="fixed-btn" onclick="showQuiz()">📝 Тест</button>

  <div id="mission-start" class="glass-panel">
    <h2>🕵️ Місія: Таємна Локація</h2>
    <p>Вітаємо, агенте! Щоб розблокувати артефакт Біосфери, пройди тест та введи код у дешифратор.</p>
    <button onclick="startMission()">🚀 РОЗПОЧАТИ</button>
  </div>

  <div id="quiz-panel" class="glass-panel">
    <h2>📝 СИНХРОНІЗАЦІЯ ДАНИХ</h2>
    <div id="quiz-content" style="text-align: left;"></div>
    <button onclick="checkQuiz()">ПЕРЕВІРИТИ</button>
    <button onclick="hideQuiz()">ЗАКРИТИ</button>
    <div id="quiz-result" style="margin-top:10px;"></div>
  </div>

  <div id="decoder-panel" class="glass-panel">
    <h2>🔐 ДЕШИФРАТОР</h2>
    <p>Введи слово-пароль, отримане після тесту:</p>
    <input id="code-input" type="text" placeholder="ПАРОЛЬ...">
    <button onclick="attemptActivation()">🔓 АКТИВУВАТИ</button>
    <button onclick="hideDecoder()">НАЗАД</button>
    <div id="decoder-result" style="margin-top:10px;"></div>
  </div>

  <div id="ar-instruction" class="glass-panel">
    <h2 style="color: #4ade80;">АРТЕФАКТ ДОСТУПНИЙ!</h2>
    <p>Торкнись підлоги, щоб викликувати планету.</p>
  </div>

  <a-scene 
    xrconfig="allowedDevices: any" 
    xrweb="disableWorldTracking: false" 
    ar-hit-test="mode: plane" 
    tap-place>
    
    <a-assets>
      <a-asset-item id="planetModel" src="planet.glb"></a-asset-item>
      <canvas id="infoCanvas" width="512" height="512" style="display:none;"></canvas>
    </a-assets>

    <a-camera id="camera" raycaster="objects: .planet-planted, .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>
    <a-light type="ambient" intensity="1.0"></a-light>
    <a-light type="directional" position="1 4 3" intensity="1.5"></a-light>
    
    <a-box id="ground" class="cantap" scale="1000 0.01 1000" visible="false"></a-box>
  </a-scene>

  <script>
    window.isARReady = false; // Блокуємо AR до введення коду

    function startMission() {
      document.getElementById('mission-start').style.display = 'none';
      document.getElementById('open-decoder').style.display = 'block';
      document.getElementById('quiz-btn').style.display = 'block';
    }

    function showQuiz() { document.getElementById('quiz-panel').style.display = 'block'; renderQuiz(); }
    function hideQuiz() { document.getElementById('quiz-panel').style.display = 'none'; }
    function hideDecoder() { document.getElementById('decoder-panel').style.display = 'none'; }
    document.getElementById('open-decoder').onclick = () => { document.getElementById('decoder-panel').style.display = 'block'; };

    const questions = [
      {q: "Час виникнення життя (млрд р)?", a: "3,5"},
      {q: "Хто засновник вчення про біосферу?", a: "вернадський"},
      {q: "Як називається 'сфера розуму'?", a: "ноосфера"}
    ];

    function renderQuiz() {
      let h = '';
      questions.forEach((q, i) => { h += `<p>${q.q}<br><input id="ans${i}"></p>`; });
      document.getElementById('quiz-content').innerHTML = h;
    }

    function checkQuiz() {
      let score = 0;
      questions.forEach((q, i) => {
        if (document.getElementById(`ans${i}`).value.toLowerCase().includes(q.a.toLowerCase())) score++;
      });
      const res = document.getElementById('quiz-result');
      if (score >= 2) res.innerHTML = "⭐ ПАРОЛЬ: <b>БІОСФЕРА</b>";
      else res.innerHTML = `Потрібно 2 правильні відповіді.`;
    }

    function attemptActivation() {
      const code = document.getElementById('code-input').value.trim().toLowerCase();
      if (code === 'біосфера') {
        window.isARReady = true;
        hideDecoder();
        document.getElementById('open-decoder').style.display = 'none';
        document.getElementById('quiz-btn').style.display = 'none';
        const inst = document.getElementById('ar-instruction');
        inst.style.display = 'block';
        inst.classList.add('success-blink');
      } else {
        alert("Код невірний!");
      }
    }
  </script>
</body>
</html>

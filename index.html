<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>🌍 Планета Життя AR — Оновлена версія</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>

  <script src="tap-place.js"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    #camera-consent, #decoder-panel, #quiz-panel {
      position: fixed;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(12px);
      color: white;
      padding: 24px;
      border-radius: 28px;
      z-index: 1000;
      text-align: center;
    }
    #camera-consent { bottom: 30px; left: 20px; right: 20px; }
    #decoder-panel, #quiz-panel { 
      top: 5%; left: 5%; right: 5%; bottom: 5%; 
      display: none; overflow-y: auto; 
    }
    button {
      background: #4CAF50; border: none; padding: 14px 28px;
      margin: 10px 6px; border-radius: 50px;
      font-size: 16px; font-weight: bold; color: white; cursor: pointer;
    }
    .decline { background: #f44336; }
    .fixed-btn {
      position: fixed; top: 20px; right: 20px;
      background: #2196F3; color: white; border: none;
      padding: 12px 24px; border-radius: 50px;
      font-weight: bold; z-index: 1001;
    }
    #quiz-btn { top: 75px; background: #9b59b6; }
    input { width: 85%; padding: 14px; margin: 12px 0; border-radius: 12px; border: none; text-align: center; }
  </style>
</head>
<body>

  <button id="open-decoder" class="fixed-btn" style="display:none;">🔑 Розшифрувати</button>
  <button id="quiz-btn" class="fixed-btn" onclick="showQuiz()" style="display:none;">📝 Вікторина</button>

  <div id="camera-consent">
    <p>📸 <strong>Потрібен доступ до камери</strong><br>Для створення Планети Життя у вашій кімнаті.</p>
    <button id="accept-camera">🌍 Почати</button>
    <button id="decline-camera" class="decline">❌ Відміна</button>
  </div>

  <div id="decoder-panel">
    <h2>🔑 Декодер</h2>
    <input id="code-input" type="text" placeholder="Введіть слово...">
    <button id="decrypt-btn">Перевірити</button>
    <button onclick="hideDecoder()">Закрити</button>
    <div id="decoder-result"></div>
  </div>

  <div id="quiz-panel">
    <h2>🌍 Вікторина: Біосфера</h2>
    <div id="quiz-content"></div>
    <button onclick="checkQuiz()">Перевірити</button>
    <button onclick="hideQuiz()">Закрити</button>
    <div id="quiz-result"></div>
  </div>

  <a-scene 
    xrconfig="allowedDevices: any" 
    xrweb="disableWorldTracking: false" 
    ar-hit-test="mode: plane" 
    tap-place>

    <a-assets>
      <a-asset-item id="planetModel" src="planet.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>

    <a-entity light="type: directional; intensity: 1.2; castShadow: true" position="4 12 6"></a-entity>
    <a-light type="ambient" intensity="0.8"></a-light>

    <a-box id="ground" class="cantap" scale="1000 0.01 1000" position="0 0 0" visible="false"></a-box>

    <a-text
      value="🌍 Торкніться поверхні, щоб посадити Планету"
      position="0 1.8 -2"
      align="center"
      width="3"
      background="true"
      background-color="black"
    ></a-text>
  </a-scene>

  <script>
    // Логіка кнопок (спрощена)
    const acceptBtn = document.getElementById('accept-camera');
    acceptBtn.onclick = () => {
      document.getElementById('camera-consent').style.display = 'none';
      document.getElementById('open-decoder').style.display = 'block';
      document.getElementById('quiz-btn').style.display = 'block';
    };

    function showQuiz() { document.getElementById('quiz-panel').style.display = 'block'; renderQuiz(); }
    function hideQuiz() { document.getElementById('quiz-panel').style.display = 'none'; }
    function hideDecoder() { document.getElementById('decoder-panel').style.display = 'none'; }
    document.getElementById('open-decoder').onclick = () => { document.getElementById('decoder-panel').style.display = 'block'; };

    // Вікторина
    const questions = [
      {q: "Хто засновник учення про біосферу?", a: "вернадський"},
      {q: "Що таке сфера розуму?", a: "ноосфера"}
    ];

    function renderQuiz() {
      let h = '';
      questions.forEach((q, i) => {
        h += `<p>${q.q}<br><input type="text" id="ans${i}"></p>`;
      });
      document.getElementById('quiz-content').innerHTML = h;
    }

    function checkQuiz() {
      let score = 0;
      questions.forEach((q, i) => {
        if (document.getElementById(`ans${i}`).value.toLowerCase().includes(q.a)) score++;
      });
      document.getElementById('quiz-result').innerText = `Результат: ${score}/${questions.length}`;
    }

    document.getElementById('decrypt-btn').onclick = () => {
      const val = document.getElementById('code-input').value.toUpperCase();
      document.getElementById('decoder-result').innerHTML = val.includes('ЖИТТЯ') ? "✅ Вірно!" : "❌ Спробуйте ще";
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>🌍 Місія: Таємна Локація</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="tap-place.js"></script>

  <style>
    :root { --glass: rgba(15, 23, 42, 0.95); --accent: #38bdf8; }
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
    .glass-panel { position: fixed; background: var(--glass); backdrop-filter: blur(15px); border-radius: 25px; z-index: 1000; text-align: center; border: 1px solid rgba(255,255,255,0.1); padding: 20px; transition: 0.4s; }
    
    #mission-start { bottom: 20px; left: 15px; right: 15px; }
    #quiz-panel, #decoder-panel { top: 5%; left: 5%; right: 5%; bottom: 5%; display: none; overflow-y: auto; }
    #ar-instruction { bottom: 30px; left: 20px; right: 20px; display: none; border: 2px solid #4ade80; }
    
    .fixed-btn { position: fixed; right: 20px; padding: 12px 20px; border-radius: 12px; font-weight: bold; z-index: 1001; display: none; border: none; color: white; }
    #quiz-btn { top: 20px; background: #8b5cf6; }
    #open-decoder { top: 80px; background: #64748b; opacity: 0.5; } /* Спочатку неактивна */

    input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; text-align: center; }
    button { background: #3b82f6; border: none; padding: 12px 20px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; margin: 5px; }
  </style>
</head>
<body>

  <button id="quiz-btn" class="fixed-btn" onclick="showQuiz()">📝 Тест</button>
  <button id="open-decoder" class="fixed-btn" disabled>🔒 Код заблоковано</button>

  <div id="mission-start" class="glass-panel">
    <h2>🕵️ СТАТУС: ПРИБУТТЯ</h2>
    <p>Агенте, пройди тест синхронізації, щоб отримати доступ до Дешифратора.</p>
    <button onclick="startMission()">🚀 РОЗПОЧАТИ</button>
  </div>

  <div id="quiz-panel" class="glass-panel">
    <h2>📡 СИНХРОНІЗАЦІЯ</h2>
    <div id="quiz-content" style="text-align: left; font-size: 14px;"></div>
    <button onclick="checkQuiz()">ПЕРЕВІРИТИ</button>
    <button onclick="hideQuiz()">ЗАКРИТИ</button>
    <div id="quiz-result" style="margin-top:10px; font-weight: bold;"></div>
  </div>

  <div id="decoder-panel" class="glass-panel">
    <h2>🔐 ДЕШИФРАТОР</h2>
    <input id="code-input" type="text" placeholder="ПАРОЛЬ...">
    <button onclick="attemptActivation()">🔓 АКТИВУВАТИ</button>
    <button onclick="hideDecoder()">НАЗАД</button>
  </div>

  <div id="ar-instruction" class="glass-panel">
    <h2 style="color: #4ade80;">ОБ'ЄКТ ВИЯВЛЕНО</h2>
    <p>Торкнись підлоги, щоб розгорнути Біосферу.</p>
  </div>

  <a-scene xrconfig="allowedDevices: any" xrweb="disableWorldTracking: false" ar-hit-test="mode: plane" tap-place>
    <a-assets><a-asset-item id="planetModel" src="planet.glb"></a-asset-item><canvas id="infoCanvas" width="512" height="512" style="display:none;"></canvas></a-assets>
    <a-camera id="camera" raycaster="objects: .planet-planted, .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 4 3" intensity="1"></a-light>
    <a-box id="ground" class="cantap" scale="1000 0.01 1000" visible="false"></a-box>
  </a-scene>

  <script>
    window.isARReady = false;
    const questions = [
      {q: "1. Час виникнення життя (млрд р)?", a: "3,5"},
      {q: "2. Хто засновник вчення про біосферу?", a: "вернадський"},
      {q: "3. Основні групи живих організмів (Р, Т, Г, Б, В)?", a: ""}, // Логіка в checkQuiz
      {q: "4. Як називається 'сфера розуму'?", a: "ноосфера"}
    ];

    function startMission() {
      document.getElementById('mission-start').style.display = 'none';
      document.getElementById('quiz-btn').style.display = 'block';
      document.getElementById('open-decoder').style.display = 'block';
    }

    function showQuiz() { document.getElementById('quiz-panel').style.display = 'block'; renderQuiz(); }
    function hideQuiz() { document.getElementById('quiz-panel').style.display = 'none'; }
    function hideDecoder() { document.getElementById('decoder-panel').style.display = 'none'; }
    document.getElementById('open-decoder').onclick = () => { document.getElementById('decoder-panel').style.display = 'block'; };

    function renderQuiz() {
      let h = '';
      questions.forEach((q, i) => { h += `<p>${q.q}<br><input id="ans${i}"></p>`; });
      document.getElementById('quiz-content').innerHTML = h;
    }

    function checkQuiz() {
      let score = 0;
      questions.forEach((q, i) => {
        const val = document.getElementById(`ans${i}`).value.toLowerCase();
        if (i === 2) {
          if (val.includes("рослини") && val.includes("тварини") && val.includes("гриби")) score++;
        } else if (val.includes(q.a.toLowerCase()) && q.a !== "") {
          score++;
        }
      });

      const res = document.getElementById('quiz-result');
      const decBtn = document.getElementById('open-decoder');
      if (score >= 4) {
        res.innerHTML = "✅ ДОСТУП ВІДКРИТО! КЛЮЧ: БІОСФЕРА";
        decBtn.disabled = false; decBtn.style.opacity = "1"; decBtn.style.background = "#f59e0b"; decBtn.innerHTML = "🔑 Ввести код";
      } else { res.innerHTML = `Виконано: ${score}/4. Потрібні всі відповіді!`; }
    }

    function attemptActivation() {
      if (document.getElementById('code-input').value.trim().toLowerCase() === 'біосфера') {
        window.isARReady = true;
        hideDecoder();
        document.getElementById('quiz-btn').style.display = 'none';
        document.getElementById('open-decoder').style.display = 'none';
        document.getElementById('ar-instruction').style.display = 'block';
      }
    }
  </script>
</body>
</html>

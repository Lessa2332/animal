<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>🌍 Планета Життя — AR-вікторина</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.8thwall.com https://cdn.jsdelivr.net 'unsafe-eval' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    media-src 'self' blob: data:;
    connect-src 'self' data: blob: https:;
    img-src 'self' data: https:;
    frame-src 'none';
    worker-src 'self' blob:;
  ">

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="tap-place.js"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; font-family: system-ui, sans-serif; }

    #camera-consent, #decoder-panel, #quiz-panel {
      position: fixed;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(12px);
      color: white;
      padding: 24px;
      border-radius: 28px;
      box-shadow: 0 6px 25px rgba(0,0,0,0.4);
      z-index: 1000;
      text-align: center;
    }
    #camera-consent { bottom: 30px; left: 20px; right: 20px; }
    #decoder-panel, #quiz-panel { 
      top: 8%; left: 5%; right: 5%; bottom: 8%; 
      display: none; overflow-y: auto; 
    }

    button {
      background: #4CAF50;
      border: none;
      padding: 14px 28px;
      margin: 10px 6px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }
    .decline { background: #f44336; }
    .fixed-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #2196F3;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: bold;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      z-index: 1001;
    }
    #quiz-btn { top: 75px; background: #9b59b6; }

    input {
      width: 85%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      font-size: 17px;
      text-align: center;
    }

    .privacy-link {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      z-index: 1000;
    }
  </style>
</head>
<body>

  <!-- Кнопки управління -->
  <button id="open-decoder" class="fixed-btn">🔑 Розшифрувати</button>
  <button id="quiz-btn" class="fixed-btn" onclick="showQuiz()">📝 Вікторина: Біосфера</button>

  <!-- Camera consent -->
  <div id="camera-consent">
    <p><strong>📸 Для гри потрібна камера</strong><br>
       Відео не записується і не передається.<br>
       Жодні дані не збираються.</p>
    <button id="accept-camera">🌍 Почати гру</button>
    <button id="decline-camera" class="decline">❌ Відмовитись</button>
  </div>

  <!-- Декодер -->
  <div id="decoder-panel">
    <h2>🌍 Обійди планету і знайди букви!</h2>
    <p>Знайди всі букви на поверхні планети під час її обертання<br>і введи їх тут:</p>
    <input id="code-input" type="text" placeholder="Наприклад: ЖИТТЯ" autocomplete="off">
    <br>
    <button id="decrypt-btn">Розшифрувати</button>
    <button onclick="hideDecoder()">Закрити</button>
    <div id="decoder-result" style="margin-top: 20px; font-size: 19px; min-height: 40px;"></div>
  </div>

  <!-- Вікторина -->
  <div id="quiz-panel">
    <h2>🌍 Вікторина: Біосфера</h2>
    <div id="quiz-content" style="text-align: left; margin-bottom: 20px;"></div>
    <button onclick="checkQuiz()">Перевірити відповіді</button>
    <button onclick="hideQuiz()">Закрити вікторину</button>
    <div id="quiz-result" style="margin-top: 20px; font-size: 19px;"></div>
  </div>

  <a-scene xrconfig="allowedDevices: any" xrweb="disableWorldTracking: false" ar-hit-test="mode: plane" tap-place>
    <a-assets>
      <a-asset-item id="planetTexture" src="planet.png"></a-asset-item>
    </a-assets>

    <a-camera id="camera" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>

    <a-entity light="type: directional; intensity: 1.25; castShadow: true" position="4 12 6"></a-entity>
    <a-light type="ambient" intensity="0.85"></a-light>

    <!-- Невидима поверхня для тапу -->
    <a-box id="ground" class="cantap" scale="4000 0.05 4000" position="0 -0.02 0" visible="false" 
           material="shader: flat; color: #228B22; transparent: true; opacity: 0"></a-box>

    <!-- Підказка для користувача -->
    <a-text
      value="🌍 Торкнись підлоги або столу, щоб створити Планету Життя\nОбійди її навколо — знайди всі букви!"
      position="0 1.75 -2.6"
      align="center"
      color="#ffffff"
      width="3.6"
      background="true"
      background-color="rgba(0,0,0,0.72)"
    ></a-text>
  </a-scene>

  <div class="privacy-link">
    <a href="assets/privacy-policy.html" target="_blank" rel="noopener noreferrer">🔒 Політика конфіденційності</a>
  </div>

  <script>
    // Основні елементи
    const consentDiv = document.getElementById('camera-consent');
    const acceptBtn = document.getElementById('accept-camera');
    const declineBtn = document.getElementById('decline-camera');
    const openDecoderBtn = document.getElementById('open-decoder');

    // Дозвіл камери
    acceptBtn.onclick = () => {
      consentDiv.style.display = 'none';
      openDecoderBtn.style.display = 'block';
    };

    declineBtn.onclick = () => {
      consentDiv.innerHTML = '<p>❌ Без доступу до камери гра неможлива.<br>Оновіть сторінку, якщо передумаєте.</p>';
    };

    // === ДЕКОДЕР ===
    function showDecoder() {
      document.getElementById('decoder-panel').style.display = 'block';
      document.getElementById('decoder-result').innerHTML = '';
    }
    function hideDecoder() {
      document.getElementById('decoder-panel').style.display = 'none';
    }
    openDecoderBtn.onclick = showDecoder;

    document.getElementById('decrypt-btn').onclick = () => {
      const input = document.getElementById('code-input').value.trim().toUpperCase();
      const resultEl = document.getElementById('decoder-result');

      if (input === 'ЖИТТЯ' || input.includes('ЖИТТЯ')) {
        resultEl.innerHTML = `<span style="color:#4CAF50">✅ Правильно!<br>Слово-код: <strong>Життя</strong> 🌍</span>`;
      } else {
        resultEl.innerHTML = `<span style="color:#f44336">❌ Неправильно.<br>Спробуй ще раз!</span>`;
      }
    };

    // === ВІКТОРИНА ===
    const quizQuestions = [
      {q: "1. Яке значення озонового шару в атмосфері?", a: "Захищає від ультрафіолетового"},
      {q: "2. Що таке органічне вивітрювання?", a: "Руйнування порід живими організмами"},
      {q: "3. Як виникли осадові породи органічного походження?", a: "З відмерлих решток рослин і тварин"},
      {q: "4. Хто засновник учення про біосферу?", a: "Володимир Вернадський"},
      {q: "5. Що таке біосфера?", a: "Простір Землі, де існує життя"},
      {q: "6. Які основні складники біосфери?", a: "Жива та нежива природа"},
      {q: "7. Де знаходяться «плівки життя»?", a: "На межі оболонок Землі"},
      {q: "8. Скільки видів рослин приблизно описано?", a: "500 тисяч"},
      {q: "9. Яка група організмів має найбільше видів?", a: "Тварини"},
      {q: "10. Що таке ноосфера?", a: "Сфера розуму"},
      {q: "11. Що таке антропогенні екосистеми?", a: "Екосистеми, створені людиною"},
      {q: "12. Яке головне завдання сучасної географії?", a: "Запобігти руйнуванню природи"}
    ];

    function showQuiz() {
      document.getElementById('quiz-panel').style.display = 'block';
      let html = '';
      quizQuestions.forEach((item, i) => {
        html += `<p><strong>${item.q}</strong><br>
          <input type="text" id="ans${i}" placeholder="Ваша відповідь..." style="width:95%; padding:12px; margin-top:8px; border-radius:10px;"></p>`;
      });
      document.getElementById('quiz-content').innerHTML = html;
      document.getElementById('quiz-result').innerHTML = '';
    }

    function hideQuiz() {
      document.getElementById('quiz-panel').style.display = 'none';
    }

    function checkQuiz() {
      let correct = 0;
      quizQuestions.forEach((item, i) => {
        const userAnswer = document.getElementById(`ans${i}`).value.trim().toLowerCase();
        if (userAnswer.length > 3 && item.a.toLowerCase().includes(userAnswer)) correct++;
      });

      const resultEl = document.getElementById('quiz-result');
      if (correct >= 9) {
        resultEl.innerHTML = `<span style="color:#4CAF50">🎉 Відмінно! Ти добре знаєш біосферу!<br>Планета Життя врятована 🌍</span>`;
      } else if (correct >= 6) {
        resultEl.innerHTML = `<span style="color:#FF9800">Добре! ${correct}/12 правильних відповідей.<br>Трохи повтори матеріал.</span>`;
      } else {
        resultEl.innerHTML = `<span style="color:#f44336">Спробуй ще раз.<br>Правильних: ${correct}/12</span>`;
      }
    }
  </script>
</body>
</html>
